name: Deploy Production

on:
  workflow_dispatch:
    inputs:
      image_tag:
        description: "ECR image tag (commit SHA)"
        required: true
        type: string

env:
  AWS_REGION: us-east-1
  ECS_CLUSTER: regintel-production
  API_SERVICE: regintel-production-api
  WORKER_SERVICE: regintel-production-worker
  WEB_SERVICE: regintel-production-web

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    environment:
      name: production
      url: ${{ vars.PRODUCTION_URL }}
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Run database migrations
        run: |
          aws ecs run-task \
            --cluster "${{ env.ECS_CLUSTER }}" \
            --launch-type FARGATE \
            --network-configuration "awsvpcConfiguration={subnets=${{ secrets.PROD_PRIVATE_SUBNETS }},securityGroups=${{ secrets.PROD_ECS_SG }},assignPublicIp=DISABLED}" \
            --task-definition regintel-production-migrate \
            --wait

      - name: Deploy API service
        uses: aws-actions/amazon-ecs-deploy-task-definition@v2
        with:
          task-definition: ${{ vars.PROD_API_TASK_DEF }}
          service: ${{ env.API_SERVICE }}
          cluster: ${{ env.ECS_CLUSTER }}
          wait-for-service-stability: true

      - name: Deploy worker service
        uses: aws-actions/amazon-ecs-deploy-task-definition@v2
        with:
          task-definition: ${{ vars.PROD_WORKER_TASK_DEF }}
          service: ${{ env.WORKER_SERVICE }}
          cluster: ${{ env.ECS_CLUSTER }}
          wait-for-service-stability: true

      - name: Deploy web service
        uses: aws-actions/amazon-ecs-deploy-task-definition@v2
        with:
          task-definition: ${{ vars.PROD_WEB_TASK_DEF }}
          service: ${{ env.WEB_SERVICE }}
          cluster: ${{ env.ECS_CLUSTER }}
          wait-for-service-stability: true

      - name: Production smoke tests
        env:
          E2E_BASE_URL: ${{ vars.PRODUCTION_URL }}
        run: |
          pip install -e ".[dev]"
          pytest tests/e2e -v
