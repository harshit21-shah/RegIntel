name: Staging Burn-In

on:
  schedule:
    - cron: "0 6 * * *"
  workflow_dispatch:

env:
  AWS_REGION: us-east-1

jobs:
  burn-in:
    runs-on: ubuntu-latest
    environment: staging
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Readiness check
        env:
          STAGING_URL: ${{ vars.STAGING_URL }}
        run: |
          curl -fsS "${STAGING_URL}/readyz"
          curl -fsS "${STAGING_URL}/healthz"

      - name: Citation eval against staging DB
        env:
          DATABASE_URL: ${{ secrets.STAGING_DATABASE_URL }}
        run: python -m services.eval.entailment.harness --persist

      - name: Ingestion staleness check
        env:
          STAGING_URL: ${{ vars.STAGING_URL }}
          STAGING_ADMIN_TOKEN: ${{ secrets.STAGING_ADMIN_TOKEN }}
        run: |
          python - <<'PY'
          import json
          import os
          import sys
          import urllib.request

          url = os.environ["STAGING_URL"].rstrip("/") + "/api/v1/admin/ingestion/status"
          req = urllib.request.Request(
              url,
              headers={"Authorization": f"Bearer {os.environ['STAGING_ADMIN_TOKEN']}"},
          )
          with urllib.request.urlopen(req, timeout=30) as resp:
              payload = json.load(resp)
          stale = [item for item in payload.get("sources", []) if item.get("stale")]
          if stale:
              print("Stale ingestion sources:", stale)
              sys.exit(1)
          print("All ingestion sources fresh")
          PY

      - name: Weekly FP report
        env:
          DATABASE_URL: ${{ secrets.STAGING_DATABASE_URL }}
        run: python scripts/weekly_fp_report.py

      - name: Summary
        run: echo "Staging burn-in checks passed" >> "$GITHUB_STEP_SUMMARY"
