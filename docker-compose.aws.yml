# Full RegIntel stack for a single AWS EC2 instance (beginner deploy).
# Usage:
#   cp .env.aws.example .env
#   # edit .env — set GROQ_API_KEY, JWT_SECRET_KEY, APP_BASE_URL
#   docker compose -f docker-compose.aws.yml up -d --build
#   docker compose -f docker-compose.aws.yml run --rm bootstrap

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: regintel
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-regintel}
      POSTGRES_DB: regintel
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U regintel -d regintel"]
      interval: 5s
      timeout: 5s
      retries: 10

  neo4j:
    image: neo4j:5.26-community
    restart: unless-stopped
    environment:
      NEO4J_AUTH: neo4j/${NEO4J_PASSWORD:-regintel}
      NEO4J_PLUGINS: '["apoc"]'
      NEO4J_dbms_security_procedures_unrestricted: apoc.*
    volumes:
      - neo4j_data:/data
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:7474 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10

  qdrant:
    image: qdrant/qdrant:v1.12.5
    restart: unless-stopped
    volumes:
      - qdrant_data:/qdrant/storage
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:6333/healthz || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  api:
    build:
      context: .
      dockerfile: services/api/Dockerfile
    restart: unless-stopped
    env_file: .env
    environment:
      APP_ENV: staging
      DATABASE_URL: postgresql+asyncpg://regintel:${POSTGRES_PASSWORD:-regintel}@postgres:5432/regintel
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USER: neo4j
      NEO4J_PASSWORD: ${NEO4J_PASSWORD:-regintel}
      QDRANT_URL: http://qdrant:6333
      REDIS_URL: redis://redis:6379/0
      AUTO_BOOTSTRAP_SEARCH: "true"
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      neo4j:
        condition: service_healthy
      qdrant:
        condition: service_healthy
      redis:
        condition: service_healthy

  web:
    build:
      context: ./web
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      API_URL: http://api:8000
      NODE_ENV: production
    ports:
      - "3000:3000"
    depends_on:
      - api

  bootstrap:
    profiles: ["bootstrap"]
    build:
      context: .
      dockerfile: services/api/Dockerfile
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://regintel:${POSTGRES_PASSWORD:-regintel}@postgres:5432/regintel
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USER: neo4j
      NEO4J_PASSWORD: ${NEO4J_PASSWORD:-regintel}
      QDRANT_URL: http://qdrant:6333
      REDIS_URL: redis://redis:6379/0
    depends_on:
      api:
        condition: service_started
    entrypoint: ["/bin/bash", "-c"]
    command:
      - |
        set -euo pipefail
        echo "Waiting for API..."
        for i in $(seq 1 60); do
          curl -sf http://api:8000/healthz >/dev/null && break
          sleep 2
        done
        echo "Running migrations..."
        alembic -c services/api/alembic.ini upgrade head
        python scripts/run_graph_migrations.py
        python services/retrieval/migrations/setup_collection.py
        python scripts/seed_demo.py
        python scripts/embed_sources.py --sources reference sec_edgar --sec-limit 5
        python scripts/seed_demo_vertical.py
        echo "Bootstrap complete."

volumes:
  postgres_data:
  neo4j_data:
  qdrant_data:
  redis_data:
